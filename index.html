<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>현장출동 당직 근무표</title>

<style>
* { box-sizing: border-box; font-family: Arial, -apple-system, BlinkMacSystemFont, sans-serif; }
body { margin: 0; background: #fff; color: #111; }
.app { max-width: 1200px; margin: 0 auto; padding: 22px 18px; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
.logo-box { width: 58px; height: 58px; border: 4px solid #111; border-radius: 7px; }
h1 { margin: 0; font-size: 36px; font-weight: 800; letter-spacing: -0.5px; }
.controls { display: flex; gap: 18px; margin-bottom: 20px; }
select { width: 170px; padding: 11px 16px; border: 1px solid #bbb; border-radius: 6px; background: white; font-size: 19px; font-weight: 700; }
.calendar { border-top: 2px solid #111; border-bottom: 2px solid #111; }
.week { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 2px solid #111; }
.week div { height: 42px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; border-right: 1px solid #222; }
.week div:last-child { border-right: none; }
.week .sun { color: #e00000; }
.week .black { color: white; background: #111; }
.week .normal { color: #111; }
.week .sat { color: #0645a8; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); }
.day { min-height: 138px; border-right: 1px solid #222; border-bottom: 1px solid #222; padding: 10px; }
.day:nth-child(7n) { border-right: none; }
.date { font-size: 22px; font-weight: 700; margin-bottom: 10px; height: 28px; line-height: 28px; }
.today-number { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; padding: 0 7px; background: #111; color: #fff !important; border-radius: 999px; line-height: 28px; }
.sunday-date { color: #e00000; }
.saturday-date { color: #0645a8; }
.other-month { color: #d1d1d1; }
.btns { display: grid; gap: 6px; margin-top: 6px; }
button { background: white; border: 1px solid #777; border-radius: 6px; font-size: 15px; font-weight: 700; padding: 7px 5px; cursor: pointer; color: #111; }
button.selected { background: #fff1f1; border: 2px solid #e00000; color: #b00000; }

@media (max-width: 800px) {
  .app { padding: 14px 8px; }
  .logo-box { width: 46px; height: 46px; border-width: 3px; }
  h1 { font-size: 26px; }
  .controls { gap: 10px; }
  select { width: 50%; font-size: 16px; }
  .week div { height: 34px; font-size: 13px; }
  .day { min-height: 108px; padding: 6px; }
  .date { font-size: 18px; margin-bottom: 7px; height: 24px; line-height: 24px; }
  .today-number { min-width: 24px; height: 24px; padding: 0 6px; line-height: 24px; }
  button { font-size: 12px; padding: 5px 2px; }
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div class="logo-box"></div>
    <h1>현장출동 당직 근무표</h1>
  </div>

  <div class="controls">
    <select id="yearSelect"></select>
    <select id="monthSelect"></select>
  </div>

  <div class="calendar">
    <div class="week">
      <div class="sun">일</div>
      <div class="black">월</div>
      <div class="normal">화</div>
      <div class="black">수</div>
      <div class="normal">목</div>
      <div class="black">금</div>
      <div class="sat">토</div>
    </div>
    <div class="days" id="days"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVcNrZPbwlKpn5FYQxwb6eOfOeFJkO7YE",
  authDomain: "joongboo-schedule.firebaseapp.com",
  projectId: "joongboo-schedule",
  storageBucket: "joongboo-schedule.firebasestorage.app",
  messagingSenderId: "613805404678",
  appId: "1:613805404678:web:9a60271ba77ad4288f8987",
  measurementId: "G-HLEQCRFT5M"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const scheduleRef = doc(db, "schedules", "fieldDutyCalendar");

const employees = ["권태훈", "송대성"];
const yearSelect = document.getElementById("yearSelect");
const monthSelect = document.getElementById("monthSelect");
const days = document.getElementById("days");

let calendarData = {};

const now = new Date();
const currentYear = now.getFullYear();
const currentMonth = now.getMonth() + 1;
const todayKey = `${currentYear}-${String(currentMonth).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;

for (let y = currentYear; y <= 2030; y++) {
  const option = document.createElement("option");
  option.value = y;
  option.textContent = `${y}년`;
  if (y === currentYear) option.selected = true;
  yearSelect.appendChild(option);
}

for (let m = 1; m <= 12; m++) {
  const option = document.createElement("option");
  option.value = m;
  option.textContent = `${m}월`;
  if (m === currentMonth) option.selected = true;
  monthSelect.appendChild(option);
}

function formatDate(year, month, day) {
  return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
}

window.toggleDuty = async function(date, employee) {
  const data = { ...calendarData };

  if (data[date] === employee) {
    delete data[date];
  } else {
    data[date] = employee;
  }

  await setDoc(scheduleRef, data);
};

function renderCalendar() {
  days.innerHTML = "";

  const year = Number(yearSelect.value);
  const month = Number(monthSelect.value);

  const firstDay = new Date(year, month - 1, 1).getDay();
  const lastDate = new Date(year, month, 0).getDate();
  const prevLastDate = new Date(year, month - 1, 0).getDate();

  let cells = [];

  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: prevLastDate - i, other: true, date: null });
  }

  for (let d = 1; d <= lastDate; d++) {
    cells.push({ day: d, other: false, date: formatDate(year, month, d) });
  }

  let nextDay = 1;
  while (cells.length < 35) {
    cells.push({ day: nextDay++, other: true, date: null });
  }

  if (cells.length > 35) {
    while (cells.length < 42) {
      cells.push({ day: nextDay++, other: true, date: null });
    }
  }

  cells.forEach((cell, index) => {
    const dayOfWeek = index % 7;
    const duty = cell.date ? calendarData[cell.date] || "" : "";
    const isToday = cell.date === todayKey;

    const div = document.createElement("div");
    div.className = "day";

    let dateClass = "";
    if (cell.other) dateClass = "other-month";
    else if (dayOfWeek === 0) dateClass = "sunday-date";
    else if (dayOfWeek === 6) dateClass = "saturday-date";

    const dateHtml = isToday
      ? `<span class="today-number">${cell.day}</span>`
      : `${cell.day}`;

    div.innerHTML = `
      <div class="date ${dateClass}">${dateHtml}</div>
      ${
        cell.other ? "" : `
        <div class="btns">
          ${employees.map(name => `
            <button 
              class="${duty === name ? "selected" : ""}"
              onclick="toggleDuty('${cell.date}', '${name}')">
              ${name}
            </button>
          `).join("")}
        </div>`
      }
    `;

    days.appendChild(div);
  });
}

onSnapshot(scheduleRef, (snapshot) => {
  calendarData = snapshot.exists() ? snapshot.data() : {};
  renderCalendar();
});

yearSelect.addEventListener("change", renderCalendar);
monthSelect.addEventListener("change", renderCalendar);

renderCalendar();
</script>
</body>
</html>
